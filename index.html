<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple E-Commerce</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 My Shop</h1>
  <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<section class="products">
  <div class="product">
    <h3>Phone</h3>
    <p>$200</p>
    <button onclick="addToCart('Phone', 200)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Laptop</h3>
    <p>$800</p>
    <button onclick="addToCart('Laptop', 800)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Headphones</h3>
    <p>$50</p>
    <button onclick="addToCart('Headphones', 50)">Add to Cart</button>
  </div>
</section>

<section class="cart-box">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: $<span id="total">0</span></h3>
  <button onclick="checkout()">Checkout</button>
</section>

<script src="script.js"></script>
</body>
</html>
